name: CI
on:
  push:
    branches-ignore:
      - 'generated'
      - 'codegen/**'
      - 'integrated/**'
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'
  schedule:
    - cron: '0 14 * * 1-5'

jobs:
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ${{ github.repository == 'stainless-sdks/privy-api-client-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Check types
        run: ./scripts/lint

  build:
    timeout-minutes: 5
    name: build
    runs-on: ${{ github.repository == 'stainless-sdks/privy-api-client-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event.pull_request.head.repo.fork
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Check build
        run: ./scripts/build

      - name: Get GitHub OIDC Token
        if: |-
          github.repository == 'stainless-sdks/privy-api-client-typescript' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        id: github-oidc
        uses: actions/github-script@v8
        with:
          script: core.setOutput('github_token', await core.getIDToken());

      - name: Upload tarball
        if: |-
          github.repository == 'stainless-sdks/privy-api-client-typescript' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        env:
          URL: https://pkg.stainless.com/s
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
        run: ./scripts/utils/upload-artifact.sh
  test:
    timeout-minutes: 10
    env:
      TEST_APP_SECRET: ${{ secrets.TEST_APP_SECRET }}
      JWT_AUTH_SK: ${{ secrets.JWT_AUTH_SK }}
      TEST_APP_TEST_ACCOUNT_OTP: ${{ secrets.TEST_APP_TEST_ACCOUNT_OTP }}
    name: test
    runs-on: ${{ github.repository == 'stainless-sdks/privy-api-client-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run tests
        run: yarn test:integration

  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: ${{ failure() && (github.ref_name == 'next' || github.ref_name == 'main') && (github.event_name == 'push' || github.event_name == 'schedule') }}
    steps:
      - name: Notify server-sdk-errors on Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SERVER_SDK_ERRORS }}
          LINT_RESULT: ${{ needs.lint.result == 'success' && 'passed' || 'failed' }}
          BUILD_RESULT: ${{ needs.build.result == 'success' && 'passed' || 'failed' }}
          TEST_RESULT: ${{ needs.test.result == 'success' && 'passed' || 'failed' }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Node SDK CI failure"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Workflow failed on `'"$BRANCH"'`.\n- `lint` job '"$LINT_RESULT"'\n- `build` job '"$BUILD_RESULT"'\n- `test` job '"$TEST_RESULT"'\n\n<'"$RUN_URL"'|View workflow run>"
                  }
                }
              ]
            }'
